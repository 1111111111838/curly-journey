name: Telegram Downloader
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'שם הערוץ (למשל flmak1)'
        required: true
        default: 'flmak1'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: sudo pip install yt-dlp

      - name: Extract and Download
        run: |
          CH_NAME="${{ github.event.inputs.channel_name }}"
          
          # שימוש ב-User-Agent כדי להיראות כמו דפדפן כרום רגיל
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "סורק את הערוץ $CH_NAME..."
          
          # שליפת הדף עם התחזות לדפדפן
          curl -s -L -H "User-Agent: $USER_AGENT" "https://t.me/s/$CH_NAME" > page.html
          
          # חילוץ הקישורים
          grep -oP "https://t.me/$CH_NAME/\d+" page.html | sort -u > links.txt
          
          # בדיקה אם נמצאו קישורים
          if [ ! -s links.txt ]; then
            echo "שגיאה: טלגרם חסמה את הסריקה או שהערוץ פרטי."
            echo "נסה שוב בעוד כמה דקות או עם ערוץ אחר."
            exit 1
          fi

          echo "נמצאו קישורים! מתחיל הורדה..."
          # שימוש ב-yt-dlp עם הגדרות תואמות
          yt-dlp -a links.txt --user-agent "$USER_AGENT" --no-check-certificate --ignore-errors

      - name: Upload Files
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: |
            ./*
            !./page.html
            !./links.txt
