name: Telegram Proxy Downloader
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'הכנס את שם הערוץ (למשל flmak1)'
        required: true
        default: 'flmak1'

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install yt-dlp
        run: sudo pip install yt-dlp

      - name: Scrape via Google Proxy
        run: |
          CH="${{ github.event.inputs.channel_name }}"
          echo "מתחבר לערוץ $CH דרך שרת מתווך..."
          
          # שימוש בשרת הפרוקסי של גוגל כדי להסתיר את הזהות של GitHub
          PROXY_URL="https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&url=https://t.me/s/$CH"
          
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$PROXY_URL" > content.html
          
          # חילוץ הקישורים מהדף שהתקבל
          grep -oP "t.me/$CH/\d+" content.html | sed 's|^|https://|' | sort -u > links.txt
          
          # הצגת הקישורים שנמצאו ביומן (לצורך בקרה)
          echo "קישורים שנמצאו:"
          cat links.txt

      - name: Execute Download
        run: |
          if [ -s links.txt ]; then
            echo "מתחיל הורדה של המדיה..."
            # הורדה עם הגדרות גמישות למניעת שגיאות
            yt-dlp -a links.txt --no-check-certificate --ignore-errors --output "%(title)s.%(ext)s"
          else
            echo "שגיאה: לא נמצאו קישורים להורדה. ייתכן והערוץ חסום לחלוטין לצפייה חיצונית."
            exit 1
          fi

      - name: Upload Files to GitHub
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-downloaded-media
          path: |
            *.mp4
            *.mkv
            *.mp3
            *.jpg
            *.png
            *.webp
