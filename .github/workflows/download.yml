name: Telegram Advanced Downloader
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'שם הערוץ'
        required: true
        default: 'flmak1'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install yt-dlp playwright
          playwright install chromium

      - name: Scrape with Browser
        run: |
          python - <<EOF
          import asyncio
          from playwright.async_api import async_playwright
          import re

          async def run():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  # פתיחת הדף הציבורי של הערוץ
                  channel = "${{ github.event.inputs.channel_name }}"
                  await page.goto(f"https://t.me/s/{channel}", wait_until="networkidle")
                  
                  # חילוץ תוכן הדף
                  content = await page.content()
                  links = list(set(re.findall(rf'https://t.me/{channel}/\d+', content)))
                  
                  with open("links.txt", "w") as f:
                      for link in links:
                          f.write(link + "\n")
                  
                  print(f"Found {len(links)} links.")
                  await browser.close()

          asyncio.run(run())
          EOF

      - name: Download Media
        run: |
          if [ -s links.txt ]; then
            yt-dlp -a links.txt --no-check-certificate --ignore-errors
          else
            echo "עדיין לא נמצאו קישורים. ייתכן והערוץ חסום לגמרי לצפייה ללא התחברות."
            exit 1
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: .
          # מעלה רק קבצי מדיה כדי לחסוך מקום
