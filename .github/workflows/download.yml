name: Telegram Brute Force
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'שם הערוץ'
        required: true
        default: 'flmak1'
      start_id:
        description: 'מאיזה מספר פוסט להתחיל?'
        required: true
        default: '1'
      end_id:
        description: 'עד איזה מספר פוסט?'
        required: true
        default: '20'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: sudo pip install yt-dlp

      - name: Forced Download
        run: |
          CH="${{ github.event.inputs.channel_name }}"
          START=${{ github.event.inputs.start_id }}
          END=${{ github.event.inputs.end_id }}
          
          echo "מנסה להוריד פוסטים מ-$START עד $END בערוץ $CH..."
          
          # יצירת רשימת כתובות באופן ידני בלי לסרוק את טלגרם
          for ((i=$START; i<=$END; i++)); do
            echo "https://t.me/$CH/$i" >> brute_links.txt
          done

          # הפעלת ההורדה עם התעלמות משגיאות (כי חלק מהמספרים יהיו ריקים)
          yt-dlp -a brute_links.txt --ignore-errors --no-warnings --user-agent "Mozilla/5.0"
          
      - name: Check and Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: .
