name: Telegram Downloader
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'שם הערוץ'
        required: true
        default: 'flmak1'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo pip install yt-dlp
          sudo apt-get install -y curl grep

      - name: Scrape and Download
        run: |
          CH="${{ github.event.inputs.channel_name }}"
          
          # הורדת הדף עם התחזות מלאה לדפדפן
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/110.0.0.0 Safari/537.36" \
          "https://t.me/s/$CH" > content.html

          # חילוץ קישורים - שיטה גמישה יותר
          grep -oP "t.me/$CH/\d+" content.html | sed 's|^|https://|' | sort -u > links.txt

          # בדיקה אם נמצא משהו
          if [ ! -s links.txt ]; then
            echo "--- שגיאה: לא נמצאו קישורים ---"
            echo "טלגרם חסמה את הגישה מהשרת של GitHub לערוץ זה."
            echo "נסה ערוץ אחר כדי לבדוק אם המערכת עובדת."
            exit 1
          fi

          echo "נמצאו קישורים! מוריד..."
          yt-dlp -a links.txt --no-check-certificate --ignore-errors

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: telegram-media
          path: .
