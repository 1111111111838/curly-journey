name: Telegram Downloader
on:
  workflow_dispatch:
    inputs:
      channel_name:
        description: 'שם הערוץ (למשל flmak1)'
        required: true
        default: 'flmak1'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: sudo pip install yt-dlp

      - name: Extract and Download
        run: |
          # שליפת הדף וחיפוש כל קישור שכולל את שם הערוץ ומספר פוסט
          # הוספנו תמיכה בפורמטים שונים של קישורים שטלגרם מייצרת
          CH_NAME="${{ github.event.inputs.channel_name }}"
          curl -s "https://t.me/s/$CH_NAME" > page.html
          
          # חיפוש קישורים בתוך קוד המקור של הדף
          grep -oP "https://t.me/$CH_NAME/\d+" page.html | sort -u > links.txt
          
          # בדיקה אם הקובץ ריק
          if [ ! -s links.txt ]; then
            echo "לא נמצאו קישורים ישירים. מנסה שיטה חלופית..."
            grep -oP "t.me/$CH_NAME/\d+" page.html | sed 's|^|https://|' | sort -u > links.txt
          fi

          if [ ! -s links.txt ]; then
            echo "שגיאה: הערוץ חסום לצפייה חיצונית או שאין בו פוסטים ציבוריים."
            exit 1
          fi

          echo "נמצאו קישורים! מתחיל הורדה..."
          cat links.txt
          yt-dlp -a links.txt --no-check-certificate --ignore-errors

      - name: Upload Files
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: telegram-files
          path: |
            ./*
            !./page.html
            !./links.txt
